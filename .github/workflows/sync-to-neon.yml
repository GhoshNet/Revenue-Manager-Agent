name: sync-to-neon

# On-demand sync: run the ETL into Neon, refresh the committed proofs, and push —
# which triggers a Render redeploy so /health matches the live /verify for the
# current day. The brief does not require a daily cron ("once per build is fine"),
# so this runs only when you trigger it (Actions tab -> sync-to-neon -> Run
# workflow) — e.g. on submission day. No LLM calls; no local DB needed.
#
# Requires repo secret NEON_DATABASE_URL = your Neon connection string.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-to-neon
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check NEON_DATABASE_URL secret is set
        run: |
          if [ -z "${{ secrets.NEON_DATABASE_URL }}" ]; then
            echo "::error::NEON_DATABASE_URL secret is not set. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Install deps (ETL + browser)
        run: |
          pip install -r requirements-etl.txt
          python -m playwright install --with-deps chromium

      - name: ETL into Neon + reconcile against /verify
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          DATA_SITE_URL: https://otel-hackathon-data-site.vercel.app
        run: python -m etl.run_etl   # exits non-zero if it does not reconcile

      - name: Commit refreshed proofs (only if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etl/SCRAPE_MANIFEST.json etl/LOAD_PROOF.json
          if git diff --staged --quiet; then
            echo "No proof changes — DB already current."
          else
            git commit -m "chore: daily data sync [skip ci]"
            git push
          fi
