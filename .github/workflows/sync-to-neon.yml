name: daily-sync

# Keeps the deployed data current with the data site's daily anchor.
# Runs the ETL against Neon (GitHub runners can reach port 5432), refreshes the
# committed proofs, and pushes — which triggers a Render redeploy so /health
# matches the live /verify for the current day. Run on a schedule and on demand
# (Actions tab -> daily-sync -> Run workflow). No LLM calls; no local DB needed.
#
# Requires repo secret NEON_DATABASE_URL = your Neon connection string.

on:
  schedule:
    - cron: "0 6 * * *"     # daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps (ETL + browser)
        run: |
          pip install -r requirements-etl.txt
          python -m playwright install --with-deps chromium

      - name: ETL into Neon + reconcile against /verify
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          DATA_SITE_URL: https://otel-hackathon-data-site.vercel.app
        run: python -m etl.run_etl   # exits non-zero if it does not reconcile

      - name: Commit refreshed proofs (only if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etl/SCRAPE_MANIFEST.json etl/LOAD_PROOF.json
          if git diff --staged --quiet; then
            echo "No proof changes — DB already current."
          else
            git commit -m "chore: daily data sync [skip ci]"
            git push
          fi
