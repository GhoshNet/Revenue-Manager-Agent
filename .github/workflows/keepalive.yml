name: keepalive

# Pings the public /health endpoint so the Render free instance does not sleep.
# /health makes no LLM calls, so this is free of model cost.
# Note: GitHub cron can be delayed under load; for the most reliable uptime also
# add an UptimeRobot monitor on the same URL (5-min interval).

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl -fsS --max-time 90 \
            https://revenue-manager-agent-zofn.onrender.com/health \
            && echo "  (awake)" || echo "  (ping failed — instance may be waking)"
